name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r seedbox-fetcher/requirements.txt
          pip install -r sab-watchdog/requirements.txt

      - name: Ruff (lint)
        run: |
          ruff check seedbox-fetcher sab-watchdog

      - name: Python syntax check
        run: |
          python -m compileall -q seedbox-fetcher sab-watchdog

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          ignore_paths: ""
          severity: error
          additional_files: ""
          check_together: "yes"
