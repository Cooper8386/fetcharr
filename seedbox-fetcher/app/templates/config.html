<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="csrf-token" content="{{ csrf_token }}" />
  <title>{{ title }}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A1%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0e1218; --bg-2: #161b25; --bg-3: #1d2330;
      --fg: #d8dde6; --fg-dim: #8c96a8; --accent: #6aa9ff;
      --ok: #65d987; --warn: #f7c948; --err: #ff6b6b;
      --border: #232a38;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    header { padding: 14px 22px; background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header nav { margin-left: auto; display: flex; gap: 14px; }
    main { padding: 22px; max-width: 760px; margin: 0 auto; }
    .card { background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 18px 22px; }
    h2 { margin: 0 0 18px; font-size: 12px; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--fg-dim); font-weight: 700; }
    .row { display: flex; gap: 16px; padding: 12px 0;
      border-bottom: 1px solid var(--border); align-items: flex-start; }
    .row:last-child { border-bottom: none; }
    .row .label { flex: 0 0 220px; }
    .row .label strong { display: block; }
    .row .label .help { color: var(--fg-dim); font-size: 12px; margin-top: 2px; }
    .row .input { flex: 1; }
    input[type="number"], input[type="text"] {
      background: var(--bg-3); border: 1px solid var(--border); color: var(--fg);
      padding: 7px 10px; border-radius: 6px; font-size: 14px; width: 200px;
      font-variant-numeric: tabular-nums;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .toolbar { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
    button {
      background: var(--bg-3); color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 16px; font-size: 14px; cursor: pointer; font-weight: 600;
    }
    button.primary { background: var(--accent); color: #0a1020; border-color: var(--accent); }
    button:hover:not(:disabled) { filter: brightness(1.1); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { margin-left: 12px; color: var(--fg-dim); font-size: 13px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    .note { margin-top: 14px; color: var(--fg-dim); font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>fetcharr config</h1>
    <nav>
      <a href="/">← Dashboard</a>
    </nav>
  </header>
  <main>
    <div class="card">
      <h2>Tunables</h2>
      <form id="cfg-form">
      {% for f in fields %}
        <div class="row">
          <div class="label">
            <strong>{{ f.name }}</strong>
            <div class="help">{{ f.help }}</div>
          </div>
          <div class="input">
            {% if f.kind == "int" %}
              <input type="number" name="{{ f.name }}" value="{{ f.value }}"
                     {% if f.min is not none %}min="{{ f.min }}"{% endif %}
                     {% if f.max is not none %}max="{{ f.max }}"{% endif %} />
            {% else %}
              <input type="text" name="{{ f.name }}" value="{{ f.value }}"
                     placeholder="(empty = unlimited)" />
            {% endif %}
          </div>
        </div>
      {% endfor %}
        <div class="toolbar">
          <button type="submit" class="primary">Save</button>
          <button type="button" id="btn-reset">Discard</button>
          <span class="status" id="status"></span>
        </div>
        <div class="note">
          Numeric tunables apply on the next poll cycle without a restart.
          Changes are also written to <code>/config/config.yml</code> so they
          survive container restarts.
        </div>
      </form>
    </div>
  </main>
  <script>
    const CSRF = document.querySelector('meta[name="csrf-token"]').content;
    const form = document.getElementById('cfg-form');
    const status = document.getElementById('status');

    document.getElementById('btn-reset').addEventListener('click', () => {
      location.reload();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const body = {};
      for (const [k, v] of fd.entries()) {
        const el = form.elements[k];
        body[k] = el.type === 'number' ? Number(v) : v;
      }
      status.className = 'status'; status.textContent = 'saving...';
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': CSRF },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          status.className = 'status err';
          status.textContent = data.detail || ('error ' + res.status);
          return;
        }
        status.className = 'status ok';
        let msg = 'saved: ' + (data.applied || []).join(', ');
        if (data.persist_warning) msg += ' (warning: ' + data.persist_warning + ')';
        status.textContent = msg;
      } catch (err) {
        status.className = 'status err';
        status.textContent = String(err);
      }
    });
  </script>
</body>
</html>
